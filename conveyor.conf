// Conveyor 配置文件 - JPEG2PDF-OFD OCR CLI
// 參考：https://www.hydraulic.software/

// 引入 Conveyor 官方 Maven 預設配置
include required("https://raw.githubusercontent.com/hydraulic-software/conveyor/master/configs/jvm/maven.conf")

app {
    // 顯示名稱（用戶看到的名字）
    display-name = "JPEG2PDF-OFD OCR CLI"
    
    // 文件系統名稱（用於安裝路徑，小寫+連字號）
    fsname = "jpeg2pdf-ofd-cli"
    
    // 反向域名（用於系統註冊）
    rdns-name = "com.ocr.jpeg2pdf"
    
    // 版本號（從 Maven pom.xml 繼承）
    version = "3.0.0"
    
    // 主要 Main Class
    jvm.gui.main-class = "com.ocr.nospring.Main"
    
    // JVM 選項
    jvm.options = [
        "-Xmx2G",           // 最大堆內存 2GB
        "-Djava.awt.headless=true"  // 無頭模式（CLI）
    ]
    
    // CLI 命令註冊
    // 安裝後，用戶可以在終端機輸入 "jpeg2pdf-ofd" 執行
    cli {
        jpeg2pdf-ofd = ${app.jvm.gui.main-class}
    }
    
    // 網站基礎 URL（用於自動更新）
    // 替換為您的 GitHub Pages URL
    site.base-url = "https://brianshih04.github.io/jpeg2pdf-ofd-conveyor"
    
    // 描述
    description = "JPEG OCR to Searchable PDF/OFD - 純 Java SE 實現"
    
    // 授權
    license = "MIT"
    
    // 廠商信息
    vendor = "Brian Shih"
    
    // 聯繫方式
    contact.email = "brianshih04@example.com"
    
    // 網站
    url = "https://github.com/brianshih04/jpeg2pdf-ofd-conveyor"
}

// Windows 特定配置
app.windows {
    // 安裝目錄（默認為 Program Files）
    install-dir = "JPEG2PDF-OFD"
    
    // 開始選單資料夾（CLI 工具不需要）
    menu-group = ""
    
    // 不創建桌面捷徑（CLI 工具）
    shortcuts = false
    
    // 不顯示在控制台的"新增/移除程式"圖標
    show-in-add-remove = true
}

// macOS 特定配置
app.mac {
    // 應用程式類別（CLI 工具）
    category = "public.app-category.utilities"
    
    // 簽名（正式發布時需要）
    // signing-certificate = "Developer ID Application: Your Name (TEAM_ID)"
}

// Linux 特定配置
app.linux {
    // 套件類型
    package-type = "deb"
    
    // 維護者
    maintainer = "Brian Shih <brianshih04@example.com>"
    
    // 分類
    categories = "Graphics;OCR;Utility"
}

// 確保 CLI 工具可以從任何目錄執行
// 用戶在任何目錄輸入 "jpeg2pdf-ofd config.json" 都能執行
