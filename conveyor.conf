// 1. 指定要打包哪一個版本與廠牌的 JDK (這裡使用 Amazon Corretto Java 17)
include "/stdlib/jdk/17/amazon.conf"

app {
    display-name = "JPEG2PDF-OFD OCR CLI"
    fsname = "jpeg2pdf-ofd-cli"
    rdns-name = "com.ocr.jpeg2pdf"
    version = "3.0.0"
    vendor = "Brian Shih"
    license = "MIT"
    
    // 支持所有平台（包括國產 Linux ARM64）
    machines = [ 
        windows.amd64,
        mac.amd64,
        mac.aarch64,
        linux.amd64.glibc,
        linux.aarch64.glibc  // 新增：支持華為鯤鵬、飛騰等 ARM64 國產平台
    ]
    
    vcs-url = "github.com/brianshih04/jpeg2pdf-ofd-conveyor"
    site.base-url = "https://brianshih04.github.io/jpeg2pdf-ofd-conveyor"
    
    // 2. 您的 JAR 檔路徑
    inputs += "target/jpeg2pdf-ofd-nospring-3.0.0-jar-with-dependencies.jar"
    
    // Tesseract tessdata (Hebrew + English)
    inputs += "tessdata/heb.traineddata"
    inputs += "tessdata/eng.traineddata"
    
    jvm {
        options = [
            "-Xmx2G",
            "-Djava.awt.headless=true"
        ]
    }
    
    // 3. CLI 指令設定
    cli {
        jpeg2pdf-ofd = "com.ocr.nospring.Main"
    }
}

// Linux 通用配置
app.linux {
    package-type = "deb"  // 默認 DEB（支持 UOS、Deepin、openEuler）
    maintainer = "Brian Shih"
    categories = "Graphics;OCR;Utility"
}

// x86_64 平台配置（支持大多數國產 Linux）
app.linux.amd64 {
    // 生成 DEB 和 RPM 兩種格式
    package-type = [ "deb", "rpm" ]
}

// ARM64 平台配置（支持華為鯤鵬、飛騰）
app.linux.aarch64 {
    // 生成 DEB 和 RPM 兩種格式
    package-type = [ "deb", "rpm" ]
}

conveyor.compatibility-level = 19
